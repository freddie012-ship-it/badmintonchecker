name: Check Badminton Availability

on:
  # Run every 30 minutes
  schedule:
    - cron: "*/30 6-23 * * *"   # every 30 min, 6am–11pm UTC (7am–midnight BST)

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

  # Also run on every push (useful for testing)
  push:
    branches: [main]

permissions:
  contents: write   # needed to commit updated availability.json back to the repo

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/availability.json
          git diff --cached --quiet || git commit -m "chore: update availability $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
